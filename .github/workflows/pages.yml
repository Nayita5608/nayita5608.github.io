name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A12FD2: ${{ secrets.A12FD2 }}
          BB6F73: ${{ secrets.BB6F73 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A12FD2', '')
          bm = os.environ.get('BB6F73', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- ed60cf9cdb9d0e811cb71a3a3cd2cdfa63c2aff2f82f -->', gm)
              s2 = s2.replace('<!-- 86852158615b53b596dc4f2b9b36eacc -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
